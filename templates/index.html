<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 WatchIt | Talk of the Town</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo"><i class="fas fa-play-circle"></i> WATCHIT</div>
        <div class="nav-links">
            <a href="#" class="active">Explore</a>
            <a href="#watchlist-section">Watchlist</a>
        </div>
    </nav>

    <div class="main-container">
        <section class="content-section">
            <div class="section-header">
                <h2><i class="fas fa-bullhorn"></i> Talk Of The Town</h2>
            </div>

            <div id="trending-grid" class="movie-grid">
            </div>
        </section>

        <section class="content-section engine-section">
            <div class="section-header">
                <h2><i class="fas fa-sliders-h"></i> Discovery Engine</h2>
                <p>Tell us what you like, we'll find what you'll love.</p>
            </div>

            <div class="discovery-panel">
                <form id="preferenceForm">
                    <div class="input-group">
                        <label>EXPLORE GENRES</label>
                        <div id="genresContainer">
                            {% for g in genres %}
                            <label>
                                <input type="checkbox" name="genre" value="{{ g['id'] }}">
                                <span class="genre-tag">{{ g['name'] }}</span>
                            </label>
                            {% endfor %}
                        </div>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label>FAVORITE ACTORS</label>
                            <input type="text" id="actors" placeholder="">
                        </div>

                        <div class="input-group">
                            <label>FAVORITE MOVIES</label>
                            <input type="text" id="movies" placeholder="">
                        </div>
                    </div>

                    <div class="input-group" style="margin-top: 15px;">
                        <label style="color: var(--accent-red);"><i class="fas fa-sparkles"></i> AI VIBE CHECK</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="vibe-input"
                                placeholder="e.g. A visually stunning sci-fi with a plot twist..."
                                style="border-color: rgba(229, 9, 20, 0.4);">
                            <button type="button" class="generate-btn" onclick="getVibeRecommendations()"
                                style="white-space: nowrap;">
                                Ask AI
                            </button>
                        </div>
                    </div>

                    <button type="button" class="generate-btn" onclick="getRecommendations(1)">
                        Generate Watchlist <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
            </div>
        </section>

        <section class="content-section" id="results-section" style="display: none;">
            <div class="section-header">
                <h2><i class="fas fa-search"></i> Discovery Results</h2>
            </div>
            <div id="results" class="movie-grid"></div>
            <div id="pagination"></div>
        </section>

        <hr style="border-color: var(--border-color); margin: 60px 0 40px 0;">

        <section class="content-section" id="watchlist-section">
            <div class="section-header">
                <h2><i class="fas fa-bookmark"></i> My Watchlist</h2>
            </div>
            <div id="watchlist-results" class="movie-grid"></div>
        </section>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
